name: script-quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck devscripts curl
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
      - name: Run shellcheck
        run: |
          files=$(git ls-files '*.sh' ':!:linux/openclaw/**')
          if [ -n "$files" ]; then
            shellcheck $files
          fi
      - name: Run shfmt
        run: |
          files=$(git ls-files '*.sh' ':!:linux/openclaw/**')
          if [ -n "$files" ]; then
            shfmt -i 4 -d $files
          fi
      - name: Run checkbashisms
        run: |
          files=$(git ls-files '*.sh' ':!:linux/openclaw/**')
          if [ -n "$files" ]; then
            checkbashisms $files
          fi

  powershell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check UTF-8 BOM on non-ASCII .ps1
        shell: pwsh
        run: pwsh -NoProfile -File ./scripts/check-ps1-utf8-bom.ps1
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Filter *.ps1 | Select-Object -ExpandProperty FullName
          if ($files.Count -gt 0) {
            foreach ($file in $files) {
              Invoke-ScriptAnalyzer -Path $file -Severity @('Error', 'ParseError') -EnableExit
            }
          }

  pester-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run Pester
        shell: pwsh
        run: |
          $testDir = Join-Path $PWD 'windows/tests'
          if (-not (Test-Path -LiteralPath $testDir -PathType Container)) {
            Write-Host "No windows/tests directory; skipping Pester."
            exit 0
          }
          $tests = @(Get-ChildItem -LiteralPath $testDir -Filter *.Tests.ps1 -Recurse -File -ErrorAction SilentlyContinue)
          if ($tests.Count -eq 0) {
            Write-Host "No *.Tests.ps1 under windows/tests; skipping Pester."
            exit 0
          }
          Invoke-Pester -Path $testDir -CI
